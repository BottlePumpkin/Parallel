name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  unit:
    name: Unit tests (swift test)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: swift test
        run: swift test

  e2e:
    name: UI tests (XCUITest)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install xcodegen
        run: brew install xcodegen
      # The XCUITest runner is sandboxed, so /usr/bin/git (a shim that calls the
      # sandbox-blocked `xcrun`) fails. E2EFixture prefers a real git binary
      # (Homebrew at /opt/homebrew/bin/git, or the Xcode CLT git). Ensure one is
      # present on the runner — Homebrew git is the reliable choice.
      - name: Ensure non-shim git
        run: brew install git
      - name: Download Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Run UI tests
        run: |
          xcodebuild test \
            -project Parallel.xcodeproj \
            -scheme Parallel \
            -destination 'platform=macOS' \
            -only-testing:ParallelUITests \
            -retry-tests-on-failure -test-iterations 2 \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=YES
