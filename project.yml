name: Parallel
options:
  bundleIdPrefix: com.byeonghopark
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.2.0
targets:
  Parallel:
    type: application
    platform: macOS
    sources:
      - Sources/Parallel
    dependencies:
      - package: SwiftTerm
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.byeonghopark.parallel
        PRODUCT_NAME: Parallel
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_HARDENED_RUNTIME: NO
  ParallelUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/ParallelUITests
    dependencies:
      - target: Parallel
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.byeonghopark.parallel.uitests
        SWIFT_VERSION: "5.10"
        TEST_TARGET_NAME: Parallel
schemes:
  Parallel:
    build:
      targets:
        Parallel: all
        ParallelUITests: [test]
    test:
      targets:
        - ParallelUITests
